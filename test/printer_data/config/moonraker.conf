[machine]
provider: systemd_cli
validate_service: False

[server]
host: 0.0.0.0
port: 7125
klippy_uds_address: ~/printer_data/comms/klippy.sock

[data_store]
temperature_store_size: 1200
gcode_store_size: 1000

[file_manager]
enable_object_processing: True

[authorization]
force_logins: False
default_source: moonraker
trusted_clients:
    0.0.0.0/0
cors_domains:
    *

[history]
#[timelapse]

[job_queue]
load_on_startup: False
automatic_transition: False

############################################
###           POWER DEVICES              ###
############################################

[power chamber_light]
type: klipper_device
object_name: output_pin output_pin
initial_state: off
locked_while_printing: False

[power enclosure_fan]
type: klipper_device
object_name: output_pin output_pin
initial_state: off
locked_while_printing: True

[power printer_led]
type: klipper_device
object_name: output_pin output_pin
initial_state: on
locked_while_printing: False

[octoprint_compat]

[announcements]
dev_mode: False
subscriptions:
    mainsail
