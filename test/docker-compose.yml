services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    expose:
      - 9090
    ports:
      - 9090:9090
    networks:
      - dev_net
    restart: unless-stopped
      
  grafana:
    hostname: grafana
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SERVER_ROOT_URL: http://localhost
      GF_SECURITY_ADMIN_PASSWORD: 'password1234!@#$' # change password
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Editor'
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
    ports:
      - "3000:3000/tcp"
    networks:
      - dev_net

  klipper-exporter:
    hostname: klipper-exporter
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: klipper-exporter
    restart: unless-stopped
    networks:
      - dev_net
    expose:
      - 9101
    command:
      - '-logging.level=Trace'

  # --------------------------------------------------------------------------
  # Virtual Klipper Printer (choose one)
  #
  # Option A: pedrolamas/docker-klipper-simulavr (full MCU simulation with
  #           SIMULAVR_PACING_RATE to avoid "Timer too close" errors)
  #           - config path: /printer/printer_data
  #
  # Option B: mainsail-crew/virtual-klipper-printer (lighter API simulation)
  #           - config path: /home/printer/printer_data
  #
  # Uncomment your preferred option and comment out the other.
  # --------------------------------------------------------------------------

  # --- Option A: pedrolamas/docker-klipper-simulavr ---
  virtual-klipper:
    container_name: virtual-klipper
    image: ghcr.io/pedrolamas/docker-klipper-simulavr:latest
    environment:
      # SIMULAVR_PACING_RATE controls the speed of the simulated MCU.
      # Lower values = slower simulation = more CPU headroom.
      # If you see "MCU 'mcu' shutdown: Timer too close" in the logs,
      # reduce this value (e.g. 0.05, 0.01). Values above 0.2 are not
      # recommended as they can starve the simulator of CPU time.
      - SIMULAVR_PACING_RATE=0.1
    volumes:
      - ./printer_data:/printer/printer_data:delegated,Z
      - type: tmpfs
        target: /printer/printer_data/comms
        tmpfs:
          mode: 0777
    ports:
      - "7125:7125"
      # - "8110:8080"  # virtual camera not required
    networks:
      - dev_net
    tmpfs:
      - /tmp:noexec

  # --- Option B: mainsail-crew/virtual-klipper-printer ---
  # virtual-klipper:
  #   container_name: virtual-klipper
  #   image: ghcr.io/mainsail-crew/virtual-klipper-printer:latest
  #   volumes:
  #     - ./printer_data:/home/printer/printer_data:delegated,Z
  #   ports:
  #     - "7125:7125"
  #     # - "8110:8080"  # virtual camera not required
  #   networks:
  #     - dev_net
  #   tmpfs:
  #     - /tmp:noexec
  #     - /home/printer/printer_data/comms:noexec

  mainsail:
    container_name: mainsail
    image: ghcr.io/mainsail-crew/mainsail
    volumes: 
      - ./config.json:/usr/share/nginx/html/config.json
    ports:
      - "8080:80"
    networks:
      - dev_net
    
volumes:
  prometheus-data:
    external: false
  grafana-data:
    external: false

networks:
  dev_net:
    driver: bridge
